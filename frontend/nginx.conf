server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the backend hostname at request time via Docker's embedded DNS.
    # Without this (and the $upstream variable below), nginx resolves "backend" once at
    # startup and caches the IP forever — so recreating the backend container (new IP)
    # leaves nginx proxying a dead address (502). The variable defers resolution to the
    # resolver, which honors the new IP within `valid`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend service
    location /api/ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket
    location /ws/ {
        set $upstream_ws http://backend:8000;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
